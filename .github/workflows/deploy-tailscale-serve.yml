name: Deploy Tailscale Serve

on:
  push:
    branches:
      - main

concurrency:
  group: tailscale-serve-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CONTAINERNODE_HOST: containernode
      REMOTE_REPO_DIR: /opt/containernode-github-repo/containernode
      REMOTE_SCRIPT: /opt/containernode-github-repo/containernode/tailscale/update-serve-config.sh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect runner to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: gha-tailscale-serve-${{ github.run_id }}
          tags: tag:ci

      - name: Verify Tailscale connectivity
        run: |
          set -euo pipefail
          tailscale status
          tailscale ping --timeout=10s "$CONTAINERNODE_HOST"

      - name: Ensure remote script is executable
        run: |
          set -euo pipefail
          tailscale ssh "$CONTAINERNODE_HOST" "chmod +x '$REMOTE_SCRIPT'"

      - name: Deploy serve config on containernode
        env:
          TAILNET_NAME: ${{ secrets.TAILNET_NAME }}
        run: |
          set -euo pipefail

          tailscale ssh "$CONTAINERNODE_HOST" \
            "export TAILNET_NAME='$TAILNET_NAME'; export GITHUB_SHA='${GITHUB_SHA}'; export GITHUB_REF_NAME='${GITHUB_REF_NAME}'; '$REMOTE_SCRIPT'"

      - name: Show remote Tailscale status on failure
        if: failure()
        run: |
          set +e
          tailscale ssh "$CONTAINERNODE_HOST" "tailscale status || true"
          tailscale ssh "$CONTAINERNODE_HOST" "tailscale serve status || true"
