apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        fsGroup: 999
      initContainers:
        - name: prepare-data-dir
          image: busybox:1.36.1
          command:
            - /bin/sh
            - -c
            - mkdir -p /var/lib/postgresql/data/pgdata && chown -R 999:999 /var/lib/postgresql/data
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
        - name: prepare-tls
          image: busybox:1.36.1
          command:
            - /bin/sh
            - -c
            - cp /tls-secret/server.crt /tls/server.crt && cp /tls-secret/server.key /tls/server.key && chown 999:999 /tls/server.crt /tls/server.key && chmod 0644 /tls/server.crt && chmod 0600 /tls/server.key
          volumeMounts:
            - name: postgres-tls-secret
              mountPath: /tls-secret
            - name: postgres-tls
              mountPath: /tls
      containers:
        - name: postgres
          image: postgres:17
          args:
            - -c
            - ssl=on
            - -c
            - ssl_cert_file=/etc/postgres-tls/server.crt
            - -c
            - ssl_key_file=/etc/postgres-tls/server.key
            - -c
            - ssl_min_protocol_version=TLSv1.2
          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-auth
                  key: postgres-database
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-auth
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-auth
                  key: postgres-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - name: postgres
              containerPort: 5432
              hostIP: 127.0.0.1
              hostPort: 5432
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 10
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            failureThreshold: 30
            periodSeconds: 10
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: postgres-tls
              mountPath: /etc/postgres-tls
              readOnly: true
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: postgres-tls-secret
          secret:
            secretName: postgres-tls
            defaultMode: 0400
        - name: postgres-tls
          emptyDir: {}
