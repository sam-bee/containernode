apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncthing
  namespace: syncthing
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: syncthing
  template:
    metadata:
      labels:
        app: syncthing
    spec:
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: configure-tailnet-only
          image: lscr.io/linuxserver/syncthing:2.0.16-ls215
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              if [ ! -f /config/config.xml ]; then
                syncthing generate --config=/config --no-default-folder --skip-port-probing
              fi

              sed -i \
                -e 's#<listenAddress>.*</listenAddress>#<listenAddress>tcp://0.0.0.0:22000</listenAddress>#' \
                -e 's#<globalAnnounceServer>.*</globalAnnounceServer>#<globalAnnounceServer></globalAnnounceServer>#' \
                -e 's#<globalAnnounceEnabled>.*</globalAnnounceEnabled>#<globalAnnounceEnabled>false</globalAnnounceEnabled>#' \
                -e 's#<localAnnounceEnabled>.*</localAnnounceEnabled>#<localAnnounceEnabled>false</localAnnounceEnabled>#' \
                -e 's#<relaysEnabled>.*</relaysEnabled>#<relaysEnabled>false</relaysEnabled>#' \
                -e 's#<startBrowser>.*</startBrowser>#<startBrowser>false</startBrowser>#' \
                -e 's#<natEnabled>.*</natEnabled>#<natEnabled>false</natEnabled>#' \
                -e 's#<stunServer>.*</stunServer>#<stunServer></stunServer>#' \
                -e 's#<announceLANAddresses>.*</announceLANAddresses>#<announceLANAddresses>false</announceLANAddresses>#' \
                -e 's#<crashReportingEnabled>.*</crashReportingEnabled>#<crashReportingEnabled>false</crashReportingEnabled>#' \
                /config/config.xml
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - name: syncthing
          image: lscr.io/linuxserver/syncthing:2.0.16-ls215
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Europe/London
          ports:
            - name: http
              containerPort: 8384
              hostIP: 127.0.0.1
              hostPort: 8384
            - name: sync-tcp
              containerPort: 22000
              hostIP: 127.0.0.1
              hostPort: 22000
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: syncthing-config
        - name: data
          persistentVolumeClaim:
            claimName: syncthing-data
