apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana
  namespace: observability
spec:
  interval: 30m
  dependsOn:
    - name: loki
      namespace: observability
  chart:
    spec:
      chart: grafana
      version: 9.2.10
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    fullnameOverride: grafana
    persistence:
      enabled: true
      existingClaim: grafana-data
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Loki
            uid: loki
            type: loki
            access: proxy
            url: http://loki:3100
            isDefault: true
            editable: false
    grafana.ini:
      analytics:
        check_for_updates: false
        reporting_enabled: false
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: grafana
            patch: |
              - op: add
                path: /spec/template/spec/containers/0/ports/0/hostIP
                value: 127.0.0.1
              - op: add
                path: /spec/template/spec/containers/0/ports/0/hostPort
                value: 3000
