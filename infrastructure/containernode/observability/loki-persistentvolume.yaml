apiVersion: v1
kind: PersistentVolume
metadata:
  name: observability-loki-data
  labels:
    observability-volume: loki
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /mnt/userdata-clusterfiles/observability-loki
    type: DirectoryOrCreate
