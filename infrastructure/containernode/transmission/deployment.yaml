apiVersion: apps/v1
kind: Deployment
metadata:
  name: transmission
  namespace: transmission
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: transmission
  template:
    metadata:
      labels:
        app: transmission
    spec:
      dnsPolicy: None
      dnsConfig:
        nameservers:
          - 10.2.0.1
      securityContext:
        fsGroup: 1000
        sysctls:
          - name: net.ipv4.conf.all.src_valid_mark
            value: "1"
      initContainers:
        - name: prepare-storage
          image: busybox:1.37.0
          command:
            - /bin/sh
            - -c
            - mkdir -p /data/config /data/downloads/complete /data/downloads/incomplete
          volumeMounts:
            - name: transmission-data
              mountPath: /data
        - name: configure-killswitch
          image: lscr.io/linuxserver/wireguard:1.0.20250521-r1-ls110
          command:
            - /bin/sh
            - /config-scripts/init-killswitch.sh
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          volumeMounts:
            - name: proton-wireguard
              mountPath: /vpn-secret
              readOnly: true
            - name: transmission-scripts
              mountPath: /config-scripts
              readOnly: true
      containers:
        - name: protonvpn
          image: lscr.io/linuxserver/wireguard:1.0.20250521-r1-ls110
          command:
            - /bin/sh
            - /config-scripts/run-wireguard.sh
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
          volumeMounts:
            - name: proton-wireguard
              mountPath: /vpn-secret
              readOnly: true
            - name: transmission-scripts
              mountPath: /config-scripts
              readOnly: true
            - name: wireguard-runtime
              mountPath: /run/wireguard
        - name: transmission
          image: lscr.io/linuxserver/transmission:4.1.1-r1-ls341
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Europe/London
            - name: TR_COPY_DEST_ROOT
              value: /incoming
          ports:
            - name: http
              containerPort: 9091
              hostIP: 127.0.0.1
              hostPort: 9091
          volumeMounts:
            - name: transmission-data
              mountPath: /config
              subPath: config
            - name: transmission-data
              mountPath: /downloads
              subPath: downloads
            - name: transmission-incoming
              mountPath: /incoming
            - name: transmission-scripts
              mountPath: /custom-scripts
              readOnly: true
        - name: proton-port-forward
          image: python:3.13.13-alpine
          command:
            - python
            - /config-scripts/proton-port-forward.py
          volumeMounts:
            - name: proton-wireguard
              mountPath: /vpn-secret
              readOnly: true
            - name: transmission-scripts
              mountPath: /config-scripts
              readOnly: true
      volumes:
        - name: proton-wireguard
          secret:
            secretName: transmission-proton-wireguard
        - name: transmission-data
          persistentVolumeClaim:
            claimName: transmission-data
        - name: transmission-incoming
          persistentVolumeClaim:
            claimName: transmission-incoming
        - name: transmission-scripts
          configMap:
            name: transmission-scripts
            defaultMode: 0755
        - name: wireguard-runtime
          emptyDir: {}
