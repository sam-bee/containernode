apiVersion: v1
kind: PersistentVolume
metadata:
  name: transmission-incoming
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /mnt/helsinki1-media/media/incoming
    type: Directory
  claimRef:
    namespace: transmission
    name: transmission-incoming
