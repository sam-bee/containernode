apiVersion: v1
kind: PersistentVolume
metadata:
  name: transmission-data
spec:
  capacity:
    storage: 1Ti
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /mnt/erithc-clusterfiles/k3s-volume/transmission
    type: DirectoryOrCreate
  claimRef:
    namespace: transmission
    name: transmission-data
