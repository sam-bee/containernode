apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat
  namespace: chat
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: chat
  template:
    metadata:
      labels:
        app: chat
    spec:
      containers:
        - name: chat
          image: ghcr.io/open-webui/open-webui:v0.9.2
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
              ephemeral-storage: 256Mi
            limits:
              memory: 2Gi
              ephemeral-storage: 1Gi
          env:
            - name: DATABASE_TYPE
              valueFrom:
                secretKeyRef:
                  name: chat-db
                  key: database-type
            - name: DATABASE_HOST
              valueFrom:
                secretKeyRef:
                  name: chat-db
                  key: host
            - name: DATABASE_PORT
              valueFrom:
                secretKeyRef:
                  name: chat-db
                  key: port
            - name: DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: chat-db
                  key: database
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: chat-db
                  key: username
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: chat-db
                  key: password
            - name: WEBUI_NAME
              value: Chat
            - name: WEBUI_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: chat-webui
                  key: secret-key
          ports:
            - containerPort: 8080
              hostIP: 127.0.0.1
              hostPort: 8080
              name: http
          volumeMounts:
            - name: chat-data
              mountPath: /app/backend/data
      volumes:
        - name: chat-data
          persistentVolumeClaim:
            claimName: chat-data
