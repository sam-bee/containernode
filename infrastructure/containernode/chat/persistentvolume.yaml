apiVersion: v1
kind: PersistentVolume
metadata:
  name: chat-data
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /mnt/erithc-clusterfiles/k3s-volumes/chat
    type: DirectoryOrCreate
  claimRef:
    namespace: chat
    name: chat-data
