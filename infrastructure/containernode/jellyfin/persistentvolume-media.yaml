apiVersion: v1
kind: PersistentVolume
metadata:
  name: jellyfin-media
spec:
  capacity:
    storage: 5Ti
  accessModes:
    - ReadOnlyMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /mnt/twindrives-clusterfiles/storage-media/media
    type: Directory
  claimRef:
    namespace: jellyfin
    name: jellyfin-media
